<!doctype html><html><head><meta charset="utf-8"><title>Card</title><link rel="stylesheet" href="_card.css"></head>
<body style="background: var(--bg-app); padding: 16px;">
<div style="width: 668px;">
  <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); overflow: hidden;">
    <!-- header -->
    <div style="display:flex; align-items:center; padding: 12px 16px; background: var(--bg-surface-muted); border-bottom: 1px solid var(--border-subtle);">
      <div style="font-size:13px; font-weight:600;">This week</div>
      <div style="margin-left:auto; font-size:12px; color: var(--fg-3);" class="mono">May 18 – 24</div>
    </div>
    <!-- body -->
    <div style="padding: 18px 20px; display:flex; gap:24px;">
      <div>
        <div class="label" style="margin-bottom:4px;">Hours logged</div>
        <div style="font-size:28px; font-weight:600; letter-spacing:-0.01em;" class="mono">32h 15m</div>
      </div>
      <div>
        <div class="label" style="margin-bottom:4px;">Reports</div>
        <div style="font-size:28px; font-weight:600; letter-spacing:-0.01em;" class="mono">4 / 5</div>
      </div>
      <div>
        <div class="label" style="margin-bottom:4px;">Reviewed</div>
        <div style="font-size:28px; font-weight:600; letter-spacing:-0.01em; color: var(--green-700);" class="mono">3</div>
      </div>
    </div>
  </div>
  <div class="t-meta" style="margin-top:10px;">1px border · radius-lg · shadow-xs · header on bg-surface-muted</div>
</div>
</body></html>
