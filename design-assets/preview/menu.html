<!doctype html><html><head><meta charset="utf-8"><title>Menu &amp; dropdown</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Menu — popover · cmd-K style</div>
  <div style="background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 4px; width: 280px;">
    <div style="padding: 4px 8px; font-size:11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600;">Actions</div>
    <div style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; background: var(--bg-subtle);">
      <span>Edit report</span>
      <span style="margin-left:auto; font-family: var(--font-mono); color: var(--fg-3); font-size:11px;">E</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px;">
      <span>Duplicate to today</span>
      <span style="margin-left:auto; font-family: var(--font-mono); color: var(--fg-3); font-size:11px;">⌘D</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px;">
      <span>Copy link</span>
      <span style="margin-left:auto; font-family: var(--font-mono); color: var(--fg-3); font-size:11px;">⌘L</span>
    </div>
    <div style="height:1px; background: var(--border-subtle); margin: 4px 4px;"></div>
    <div style="padding: 4px 8px; font-size:11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600;">Move</div>
    <div style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px;">
      <span>Reassign…</span>
      <span style="margin-left:auto; color: var(--fg-3); font-size:14px;">›</span>
    </div>
    <div style="height:1px; background: var(--border-subtle); margin: 4px 4px;"></div>
    <div style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; color: var(--danger);">
      <span>Archive</span>
      <span style="margin-left:auto; font-family: var(--font-mono); color: var(--red-500); font-size:11px; opacity: 0.7;">⌫</span>
    </div>
  </div>
</div>
</body></html>
