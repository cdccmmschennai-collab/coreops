<!doctype html><html><head><meta charset="utf-8"><title>Slate scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:12px;">Slate — the workhorse neutral · cool, very slightly blue</div>
  <div style="display:grid; grid-template-columns: repeat(12, 1fr); gap:6px;">
    <!-- 50, 100, 150, 200, 300, 400, 500, 600, 700, 800, 900, 950 -->
    <div style="aspect-ratio:1; background:var(--slate-50); border:1px solid var(--border-subtle); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-100); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-150); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-200); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-300); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-400); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-500); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-600); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-700); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-800); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-900); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--slate-950); border-radius:6px;"></div>
  </div>
  <div class="mono" style="display:grid; grid-template-columns: repeat(12, 1fr); gap:6px; margin-top:6px; font-size:10px; color:var(--fg-3); text-align:center;">
    <span>50</span><span>100</span><span>150</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>950</span>
  </div>
</div>
</body></html>
