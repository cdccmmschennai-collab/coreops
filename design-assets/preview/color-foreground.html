<!doctype html><html><head><meta charset="utf-8"><title>Foreground tokens</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Foreground roles — text contrast hierarchy</div>
  <div style="display:flex; flex-direction:column; gap:8px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:14px; height:14px; background:var(--fg-1); border-radius:3px;"></div>
      <span style="color:var(--fg-1); font-size:14px;">fg-1 — Primary text &amp; headings</span>
      <span class="mono" style="font-size:11px; color:var(--fg-3); margin-left:auto;">slate-900</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:14px; height:14px; background:var(--fg-2); border-radius:3px;"></div>
      <span style="color:var(--fg-2); font-size:14px;">fg-2 — Secondary, body in dense UI</span>
      <span class="mono" style="font-size:11px; color:var(--fg-3); margin-left:auto;">slate-600</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:14px; height:14px; background:var(--fg-3); border-radius:3px;"></div>
      <span style="color:var(--fg-3); font-size:14px;">fg-3 — Meta, captions, overlines</span>
      <span class="mono" style="font-size:11px; color:var(--fg-3); margin-left:auto;">slate-500</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:14px; height:14px; background:var(--fg-4); border-radius:3px;"></div>
      <span style="color:var(--fg-4); font-size:14px;">fg-4 — Placeholder, disabled</span>
      <span class="mono" style="font-size:11px; color:var(--fg-3); margin-left:auto;">slate-400</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:14px; height:14px; background:var(--fg-link); border-radius:3px;"></div>
      <span style="color:var(--fg-link); font-size:14px;">fg-link — Links, mentions</span>
      <span class="mono" style="font-size:11px; color:var(--fg-3); margin-left:auto;">blue-600</span>
    </div>
  </div>
</div>
</body></html>
