<!doctype html><html><head><meta charset="utf-8"><title>Type — body & meta</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-body-lg">The team submitted 9 reports today.</span>
      <span class="label mono">Body Lg · 16 · 400 · Inter</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-body">Submitted 4 reports this week, 2 pending review.</span>
      <span class="label mono">Body Base · 14 · 400</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-body-sm">Last updated by Priya · 12 minutes ago</span>
      <span class="label mono">Body Sm · 12 · 400 · fg-2</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-meta">Caption · last sync 4:32 PM</span>
      <span class="label mono">Tiny · 11 · 400 · fg-3</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-overline">Overline label</span>
      <span class="label mono">Tiny · 11 · 600 · uppercase</span>
    </div>
  </div>
</div>
</body></html>
