<!doctype html><html><head><meta charset="utf-8"><title>Type — pairing & accents</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px;">
    <div style="padding:14px 16px; border:1px solid var(--border); border-radius:var(--radius-md);">
      <div style="display:flex; align-items:baseline; gap:14px;">
        <span class="t-h1" style="font-family:var(--font-serif); font-size:48px; line-height:1; font-weight:700;">Aa</span>
        <div>
          <div style="font-weight:600; font-size:14px;">Source Serif 4</div>
          <div style="font-size:11px; color:var(--fg-3); margin-top:2px;">Headings &amp; accents</div>
          <span style="display:inline-block; margin-top:6px; padding:1px 8px; font-size:10px; font-weight:600; color:var(--green-700); background:var(--green-50); border:1px solid var(--green-100); border-radius:9999px;">SECONDARY</span>
        </div>
      </div>
    </div>
    <div style="padding:14px 16px; border:1px solid var(--border); border-radius:var(--radius-md);">
      <div style="display:flex; align-items:baseline; gap:14px;">
        <span style="font-family:var(--font-sans); font-size:48px; line-height:1; font-weight:600;">Aa</span>
        <div>
          <div style="font-weight:600; font-size:14px;">Inter</div>
          <div style="font-size:11px; color:var(--fg-3); margin-top:2px;">Body, UI, data, tables</div>
          <span style="display:inline-block; margin-top:6px; padding:1px 8px; font-size:10px; font-weight:600; color:var(--blue-700); background:var(--blue-50); border:1px solid var(--blue-100); border-radius:9999px;">PRIMARY</span>
        </div>
      </div>
    </div>
  </div>
  <div style="margin-top:14px; padding: 12px 16px; background: var(--slate-50); border-radius: var(--radius-md); border: 1px solid var(--border-subtle);">
    <span class="t-accent" style="font-size: 18px;">"We replaced four spreadsheets with WorkTrack."</span>
    <div style="margin-top:6px; font-size: 11px; color: var(--fg-3);">Editorial accent · Source Serif 4 italic on body surfaces</div>
  </div>
</div>
</body></html>
