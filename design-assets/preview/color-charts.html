<!doctype html><html><head><meta charset="utf-8"><title>Chart palette</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Chart palette — fixed, ordered · 6 categorical hues</div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px;">
    <div><div style="height:40px; background:var(--chart-1); border-radius:6px;"></div><div style="margin-top:6px; font-size:11px; font-weight:600;">Blue</div><div class="mono" style="font-size:10px; color:var(--fg-3);">chart-1</div></div>
    <div><div style="height:40px; background:var(--chart-2); border-radius:6px;"></div><div style="margin-top:6px; font-size:11px; font-weight:600;">Teal</div><div class="mono" style="font-size:10px; color:var(--fg-3);">chart-2</div></div>
    <div><div style="height:40px; background:var(--chart-3); border-radius:6px;"></div><div style="margin-top:6px; font-size:11px; font-weight:600;">Violet</div><div class="mono" style="font-size:10px; color:var(--fg-3);">chart-3</div></div>
    <div><div style="height:40px; background:var(--chart-4); border-radius:6px;"></div><div style="margin-top:6px; font-size:11px; font-weight:600;">Amber</div><div class="mono" style="font-size:10px; color:var(--fg-3);">chart-4</div></div>
    <div><div style="height:40px; background:var(--chart-5); border-radius:6px;"></div><div style="margin-top:6px; font-size:11px; font-weight:600;">Rose</div><div class="mono" style="font-size:10px; color:var(--fg-3);">chart-5</div></div>
    <div><div style="height:40px; background:var(--chart-6); border-radius:6px;"></div><div style="margin-top:6px; font-size:11px; font-weight:600;">Emerald</div><div class="mono" style="font-size:10px; color:var(--fg-3);">chart-6</div></div>
  </div>
  <div class="t-meta" style="margin-top:14px;">Assigned per category. Never random. Re-use the same color for the same category across views.</div>
</div>
</body></html>
