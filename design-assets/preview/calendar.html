<!doctype html><html><head><meta charset="utf-8"><title>Calendar / date picker</title><link rel="stylesheet" href="_card.css">
<style>
  .cal { width: 260px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 12px; }
  .cal-hd { display:flex; align-items:center; justify-content:space-between; font-size:13px; font-weight: 600; margin-bottom: 8px; }
  .cal-nav { color: var(--fg-3); font-size: 14px; cursor:pointer; padding: 2px 6px; border-radius: 4px; }
  .cal-grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { font-size: 10px; color: var(--fg-3); text-align: center; padding: 6px 0 4px; font-weight: 500; }
  .cal-day { font-size: 12px; text-align: center; padding: 6px 0; border-radius: 6px; color: var(--fg-1); font-family: var(--font-mono); font-feature-settings: 'tnum' 1; cursor: pointer; }
  .cal-day.muted { color: var(--fg-4); }
  .cal-day.today { background: var(--slate-100); font-weight: 600; }
  .cal-day.in-range { background: var(--blue-50); border-radius: 0; color: var(--blue-700); }
  .cal-day.range-start { background: var(--blue-600); color: #fff; border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .cal-day.range-end { background: var(--blue-600); color: #fff; border-top-left-radius: 0; border-bottom-left-radius: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:12px;">Date picker — single + range</div>
  <div style="display:flex; gap:18px; align-items:flex-start;">
    <div class="cal">
      <div class="cal-hd">
        <span class="cal-nav">‹</span>
        May 2026
        <span class="cal-nav">›</span>
      </div>
      <div class="cal-grid">
        <div class="cal-dow">M</div><div class="cal-dow">T</div><div class="cal-dow">W</div><div class="cal-dow">T</div><div class="cal-dow">F</div><div class="cal-dow">S</div><div class="cal-dow">S</div>
        <div class="cal-day muted">27</div><div class="cal-day muted">28</div><div class="cal-day muted">29</div><div class="cal-day muted">30</div><div class="cal-day">1</div><div class="cal-day">2</div><div class="cal-day">3</div>
        <div class="cal-day">4</div><div class="cal-day">5</div><div class="cal-day">6</div><div class="cal-day">7</div><div class="cal-day">8</div><div class="cal-day">9</div><div class="cal-day">10</div>
        <div class="cal-day">11</div><div class="cal-day">12</div><div class="cal-day">13</div><div class="cal-day">14</div><div class="cal-day">15</div><div class="cal-day">16</div><div class="cal-day">17</div>
        <div class="cal-day range-start">18</div><div class="cal-day in-range">19</div><div class="cal-day in-range">20</div><div class="cal-day in-range">21</div><div class="cal-day in-range">22</div><div class="cal-day in-range">23</div><div class="cal-day range-end">24</div>
        <div class="cal-day today">25</div><div class="cal-day">26</div><div class="cal-day">27</div><div class="cal-day">28</div><div class="cal-day">29</div><div class="cal-day">30</div><div class="cal-day">31</div>
      </div>
    </div>
    <div style="font-size:12px; color: var(--fg-3); display:flex; flex-direction:column; gap:8px; margin-top:6px;">
      <div><span class="mono" style="color:var(--fg-1);">May 18 – 24</span><br/>range</div>
      <div><span class="mono" style="color:var(--fg-1);">May 25</span><br/>today</div>
      <div class="mono" style="color: var(--fg-3); font-size: 11px;">mon-start · tnum</div>
    </div>
  </div>
</div>
</body></html>
