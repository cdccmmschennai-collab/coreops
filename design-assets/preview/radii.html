<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Corner radii</div>
  <div style="display:flex; gap:14px; align-items:flex-end;">
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-xs);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">xs</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">4 · checkbox</div>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-sm);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">sm</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">6 · button · input</div>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-md);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">md</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">8 · badge · field</div>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-lg);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">lg</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">10 · card</div>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-xl);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">xl</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">12 · modal</div>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-2xl);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">2xl</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">16 · feature</div>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:var(--slate-100); border:1px solid var(--border); border-radius:var(--radius-full);"></div>
      <div style="margin-top:6px; font-size:11px; font-weight:600;">full</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">avatar · pill</div>
    </div>
  </div>
</div>
</body></html>
