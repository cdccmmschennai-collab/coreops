<!doctype html><html><head><meta charset="utf-8"><title>Cadence Blue</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:12px;">Cadence Blue — the single accent · primary actions, focus, selection</div>
  <div style="display:grid; grid-template-columns: repeat(9, 1fr); gap:6px;">
    <div style="aspect-ratio:1; background:var(--blue-50); border:1px solid var(--border-subtle); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-100); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-200); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-300); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-400); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-500); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-600); border-radius:6px; outline:2px solid var(--blue-200); outline-offset:2px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-700); border-radius:6px;"></div>
    <div style="aspect-ratio:1; background:var(--blue-800); border-radius:6px;"></div>
  </div>
  <div class="mono" style="display:grid; grid-template-columns: repeat(9, 1fr); gap:6px; margin-top:6px; font-size:10px; color:var(--fg-3); text-align:center;">
    <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span>
  </div>
  <div style="margin-top:14px; display:flex; gap:8px; align-items:center;">
    <span style="background:var(--blue-600); color:#fff; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600;">600 = primary</span>
    <span class="t-meta">hover → 700 · active → 800 · focus ring → 500 @ 22%</span>
  </div>
</div>
</body></html>
