<!doctype html><html><head><meta charset="utf-8"><title>Chart styles</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Chart styles — minimal grid · fixed palette</div>
  <svg viewBox="0 0 660 160" width="100%" style="display:block;">
    <!-- y grid -->
    <g stroke="var(--border-subtle)" stroke-dasharray="2 3" fill="none">
      <line x1="40" y1="20"  x2="640" y2="20"/>
      <line x1="40" y1="60"  x2="640" y2="60"/>
      <line x1="40" y1="100" x2="640" y2="100"/>
      <line x1="40" y1="140" x2="640" y2="140"/>
    </g>
    <!-- y axis labels -->
    <g font-family="Geist Mono, monospace" font-size="10" fill="var(--fg-3)" text-anchor="end">
      <text x="34" y="24">10h</text>
      <text x="34" y="64">6h</text>
      <text x="34" y="104">3h</text>
      <text x="34" y="144">0</text>
    </g>
    <!-- bars: 7 days, two stacked categories -->
    <g>
      <!-- day groups -->
      <g transform="translate(60,0)">
        <rect x="0"  y="60"  width="40" height="80" rx="3" fill="var(--chart-1)" opacity="0.9"/>
        <rect x="0"  y="30"  width="40" height="30" rx="3" fill="var(--chart-2)" opacity="0.9"/>
      </g>
      <g transform="translate(140,0)">
        <rect x="0"  y="50"  width="40" height="90" rx="3" fill="var(--chart-1)" opacity="0.9"/>
        <rect x="0"  y="20"  width="40" height="30" rx="3" fill="var(--chart-2)" opacity="0.9"/>
      </g>
      <g transform="translate(220,0)">
        <rect x="0"  y="74"  width="40" height="66" rx="3" fill="var(--chart-1)" opacity="0.9"/>
        <rect x="0"  y="44"  width="40" height="30" rx="3" fill="var(--chart-2)" opacity="0.9"/>
      </g>
      <g transform="translate(300,0)">
        <rect x="0"  y="62"  width="40" height="78" rx="3" fill="var(--chart-1)" opacity="0.9"/>
        <rect x="0"  y="30"  width="40" height="32" rx="3" fill="var(--chart-2)" opacity="0.9"/>
      </g>
      <g transform="translate(380,0)">
        <rect x="0"  y="80"  width="40" height="60" rx="3" fill="var(--chart-1)" opacity="0.9"/>
        <rect x="0"  y="58"  width="40" height="22" rx="3" fill="var(--chart-2)" opacity="0.9"/>
      </g>
      <g transform="translate(460,0)">
        <rect x="0"  y="92"  width="40" height="48" rx="3" fill="var(--chart-1)" opacity="0.6"/>
        <rect x="0"  y="76"  width="40" height="16" rx="3" fill="var(--chart-2)" opacity="0.6"/>
      </g>
      <g transform="translate(540,0)">
        <rect x="0"  y="120" width="40" height="20" rx="3" fill="var(--chart-1)" opacity="0.3"/>
      </g>
    </g>
    <!-- x labels -->
    <g font-family="Geist Mono, monospace" font-size="10" fill="var(--fg-3)" text-anchor="middle">
      <text x="80" y="156">M</text>
      <text x="160" y="156">T</text>
      <text x="240" y="156">W</text>
      <text x="320" y="156">T</text>
      <text x="400" y="156">F</text>
      <text x="480" y="156">S</text>
      <text x="560" y="156">S</text>
    </g>
  </svg>
  <div style="display:flex; gap:14px; margin-top:6px; font-size:12px; color:var(--fg-2);">
    <span style="display:inline-flex; align-items:center; gap:6px;"><span style="width:10px; height:10px; background:var(--chart-1); border-radius:2px;"></span>Reporting</span>
    <span style="display:inline-flex; align-items:center; gap:6px;"><span style="width:10px; height:10px; background:var(--chart-2); border-radius:2px;"></span>Reviews</span>
    <span class="mono" style="color:var(--fg-3); margin-left:auto;">stroke 1 · dashed grid · 8px corner radius on bars</span>
  </div>
</div>
</body></html>
