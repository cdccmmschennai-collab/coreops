<!doctype html><html><head><meta charset="utf-8"><title>Type — display & headings</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-display" style="line-height:1;">Daily standup</span>
      <span class="label mono">H1 · 40 · 700 · Source Serif 4</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-h2">Team productivity</span>
      <span class="label mono">H2 · 32 · 600 · Serif</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-h3">This week</span>
      <span class="label mono">H3 · 24 · 600 · Serif</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-h4">Open blockers</span>
      <span class="label mono">H4 · 20 · 600 · Serif</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:14px;">
      <span class="t-h5">Section title</span>
      <span class="label mono">H5 · 18 · 600 · Serif</span>
    </div>
  </div>
</div>
</body></html>
