<!doctype html><html><head><meta charset="utf-8"><title>Table row</title><link rel="stylesheet" href="_card.css">
<style>
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; font-weight: 500; color: var(--fg-3);
    font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 10px 16px;
    background: var(--bg-surface-muted);
    border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); }
  tbody tr:hover { background: var(--slate-50); }
  tbody tr.sel { background: var(--blue-50); }
  .av { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; color:#fff; font-size:10px; font-weight:600; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight:500; }
  .b-rev { background: var(--blue-50);  color: var(--blue-700); border:1px solid var(--blue-100); }
  .b-ok  { background: var(--green-50); color: var(--green-700); border:1px solid var(--green-100); }
  .b-pd  { background: var(--amber-50); color: var(--amber-700); border:1px solid var(--amber-100); }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head>
<body style="background:#fff;">
<div style="width:700px; border:1px solid var(--border); border-radius: var(--radius-lg); overflow:hidden;">
  <table>
    <thead>
      <tr>
        <th>Report</th><th>Submitted</th><th>Hours</th><th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="av" style="background:#4F70E0;">PR</div>
            <div><div style="font-weight:500;">May 24 — daily</div><div style="color:var(--fg-3); font-size:11px;">Cadence Web</div></div>
          </div>
        </td>
        <td class="mono" style="color:var(--fg-2);">4:32 PM</td>
        <td class="mono">7h 45m</td>
        <td><span class="badge b-ok"><span class="dot" style="background:var(--green-500);"></span>submitted</span></td>
      </tr>
      <tr class="sel">
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="av" style="background:#8B5CF6;">JK</div>
            <div><div style="font-weight:500;">May 24 — daily</div><div style="color:var(--fg-3); font-size:11px;">Mobile · Reporting API</div></div>
          </div>
        </td>
        <td class="mono" style="color:var(--fg-2);">4:18 PM</td>
        <td class="mono">8h 10m</td>
        <td><span class="badge b-rev"><span class="dot" style="background:var(--blue-500);"></span>in review</span></td>
      </tr>
      <tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="av" style="background:#14B8A6;">AN</div>
            <div><div style="font-weight:500;">May 24 — daily</div><div style="color:var(--fg-3); font-size:11px;">Mobile</div></div>
          </div>
        </td>
        <td class="mono" style="color:var(--fg-2);">3:50 PM</td>
        <td class="mono">5h 30m</td>
        <td><span class="badge b-pd"><span class="dot" style="background:var(--amber-500);"></span>pending</span></td>
      </tr>
    </tbody>
  </table>
</div>
</body></html>
