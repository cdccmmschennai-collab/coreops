<!doctype html><html><head><meta charset="utf-8"><title>Status badges</title><link rel="stylesheet" href="_card.css">
<style>
  .badge {
    display:inline-flex; align-items:center; gap:6px;
    padding: 2px 8px; border-radius: var(--radius-full);
    font-size: 11px; font-weight: 500;
    border: 1px solid transparent;
  }
  .dot { width: 6px; height: 6px; border-radius: var(--radius-full); }
  .b-draft   { background: var(--slate-100); color: var(--slate-700);  }
  .b-pending { background: var(--amber-50);  color: var(--amber-700); border-color: var(--amber-100); }
  .b-review  { background: var(--blue-50);   color: var(--blue-700);  border-color: var(--blue-100); }
  .b-done    { background: var(--green-50);  color: var(--green-700); border-color: var(--green-100); }
  .b-blocked { background: var(--red-50);    color: var(--red-700);   border-color: var(--red-100); }
  .b-archived{ background: var(--slate-100); color: var(--slate-500); }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Status badges — sentence case · pill</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <span class="badge b-draft"><span class="dot" style="background:var(--slate-400);"></span>draft</span>
    <span class="badge b-pending"><span class="dot" style="background:var(--amber-500);"></span>pending</span>
    <span class="badge b-review"><span class="dot" style="background:var(--blue-500);"></span>in review</span>
    <span class="badge b-done"><span class="dot" style="background:var(--green-500);"></span>submitted</span>
    <span class="badge b-done"><span class="dot" style="background:var(--green-600);"></span>approved</span>
    <span class="badge b-blocked"><span class="dot" style="background:var(--red-500);"></span>blocked</span>
    <span class="badge b-blocked"><span class="dot" style="background:var(--red-600);"></span>overdue</span>
    <span class="badge b-archived"><span class="dot" style="background:var(--slate-300);"></span>archived</span>
  </div>
  <div class="t-meta" style="margin-top:14px;">Lowercase labels. Soft tinted background + matching text and 1px tinted border. 6px leading dot.</div>
</div>
</body></html>
