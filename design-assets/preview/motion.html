<!doctype html><html><head><meta charset="utf-8"><title>Motion</title><link rel="stylesheet" href="_card.css">
<style>
  .pip { width:28px; height:28px; background: var(--blue-600); border-radius:6px; }
  .track { position:relative; height:28px; background:var(--slate-100); border-radius:6px; overflow:hidden; }
  .ease-out  .pip { animation: slide 1800ms var(--ease-out) infinite; }
  .ease-in   .pip { animation: slide 1800ms var(--ease-in)  infinite; }
  .ease-io   .pip { animation: slide 1800ms var(--ease-inout) infinite; }
  @keyframes slide {
    0%, 10%   { transform: translateX(0); }
    50%       { transform: translateX(calc(100% - 28px)); }
    90%, 100% { transform: translateX(0); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Motion — Linear-style easing · short, never bouncy</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:grid; grid-template-columns: 110px 1fr 180px; gap:14px; align-items:center;">
      <span class="mono" style="font-size:12px;">ease-out</span>
      <div class="track ease-out"><div class="pip"></div></div>
      <span class="mono" style="font-size:11px; color:var(--fg-3);">cubic-bezier(.2, 0, 0, 1)</span>
    </div>
    <div style="display:grid; grid-template-columns: 110px 1fr 180px; gap:14px; align-items:center;">
      <span class="mono" style="font-size:12px;">ease-in</span>
      <div class="track ease-in"><div class="pip"></div></div>
      <span class="mono" style="font-size:11px; color:var(--fg-3);">cubic-bezier(.4, 0, 1, 1)</span>
    </div>
    <div style="display:grid; grid-template-columns: 110px 1fr 180px; gap:14px; align-items:center;">
      <span class="mono" style="font-size:12px;">ease-in-out</span>
      <div class="track ease-io"><div class="pip"></div></div>
      <span class="mono" style="font-size:11px; color:var(--fg-3);">cubic-bezier(.4, 0, .2, 1)</span>
    </div>
  </div>
  <div style="margin-top:14px; display:flex; gap:18px; font-size:12px; color:var(--fg-2);">
    <span><span class="mono" style="color:var(--fg-1);">120ms</span> fast / hover</span>
    <span><span class="mono" style="color:var(--fg-1);">150ms</span> base / press</span>
    <span><span class="mono" style="color:var(--fg-1);">200ms</span> panel</span>
    <span><span class="mono" style="color:var(--fg-1);">240ms</span> page</span>
  </div>
</div>
</body></html>
