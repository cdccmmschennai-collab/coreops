<!doctype html><html><head><meta charset="utf-8"><title>Logo &amp; wordmark</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:16px;">Logo — navy square · ascending bars · Inter wordmark</div>
  <div style="display:flex; gap: 32px; align-items:center;">
    <!-- mark -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <svg viewBox="0 0 32 32" width="56" height="56">
        <rect width="32" height="32" rx="7" fill="#1A2C6C"/>
        <rect x="7"  y="18" width="4" height="8"  rx="1" fill="#fff"/>
        <rect x="14" y="13" width="4" height="13" rx="1" fill="#fff"/>
        <rect x="21" y="8"  width="4" height="18" rx="1" fill="#fff"/>
      </svg>
      <span class="mono" style="font-size: 10px; color: var(--fg-3);">mark · 56</span>
    </div>

    <!-- wordmark -->
    <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-start;">
      <div style="display:flex; align-items:center; gap: 12px;">
        <svg viewBox="0 0 32 32" width="36" height="36">
          <rect width="32" height="32" rx="7" fill="#1A2C6C"/>
          <rect x="7"  y="18" width="4" height="8"  rx="1" fill="#fff"/>
          <rect x="14" y="13" width="4" height="13" rx="1" fill="#fff"/>
          <rect x="21" y="8"  width="4" height="18" rx="1" fill="#fff"/>
        </svg>
        <div>
          <div style="font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg-1); line-height: 1.1;">WorkTrack</div>
          <div style="font-size: 11px; font-weight: 400; color: var(--fg-2); margin-top: 2px;">Employee Work Reporting System</div>
        </div>
      </div>
      <span class="mono" style="font-size: 10px; color: var(--fg-3);">wordmark + tagline · login &amp; marketing</span>
    </div>

    <!-- monochrome variants -->
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center; margin-left:auto;">
      <div style="display:flex; gap:10px;">
        <svg viewBox="0 0 32 32" width="36" height="36">
          <rect width="32" height="32" rx="7" fill="#141821"/>
          <rect x="7"  y="18" width="4" height="8"  rx="1" fill="#fff"/>
          <rect x="14" y="13" width="4" height="13" rx="1" fill="#fff"/>
          <rect x="21" y="8"  width="4" height="18" rx="1" fill="#fff"/>
        </svg>
        <svg viewBox="0 0 32 32" width="36" height="36">
          <rect width="32" height="32" rx="7" fill="#fff" stroke="var(--border)"/>
          <rect x="7"  y="18" width="4" height="8"  rx="1" fill="#141821"/>
          <rect x="14" y="13" width="4" height="13" rx="1" fill="#141821"/>
          <rect x="21" y="8"  width="4" height="18" rx="1" fill="#141821"/>
        </svg>
      </div>
      <span class="mono" style="font-size: 10px; color: var(--fg-3);">mono · favicons</span>
    </div>
  </div>
</div>
</body></html>
