<!doctype html><html><head><meta charset="utf-8"><title>Sidebar nav</title><link rel="stylesheet" href="_card.css"></head>
<body style="background:#fff; padding:0;">
<div style="display:flex;">
  <!-- sidebar -->
  <div style="width: 240px; background: var(--slate-50); border-right: 1px solid var(--border); padding: 16px 12px; height: 280px;">
    <div style="display:flex; align-items:center; gap:8px; padding: 0 8px 14px;">
      <div style="width: 22px; height: 22px; border-radius: 6px; background: var(--blue-600); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:12px;">C</div>
      <span style="font-weight:600; font-size:14px;">Cadence</span>
    </div>
    <div style="font-size:11px; font-weight:600; color: var(--fg-3); letter-spacing:0.06em; text-transform:uppercase; padding: 6px 8px;">Workspace</div>

    <a style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; color: var(--fg-1); text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </a>
    <a style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; background: var(--blue-50); color: var(--blue-700); font-weight:500; text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
      My reports
    </a>
    <a style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; color: var(--fg-1); text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="9" r="2.5"/><path d="M15 20c0-2 2-3 4-3s3 1 3 3"/></svg>
      Team
      <span style="margin-left:auto; font-size:10px; color:var(--fg-3);" class="mono">12</span>
    </a>
    <a style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; color: var(--fg-1); text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg>
      Projects
    </a>
    <a style="display:flex; align-items:center; gap:10px; padding: 6px 8px; border-radius: 6px; font-size:13px; color: var(--fg-1); text-decoration:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      Analytics
    </a>
  </div>
  <!-- callouts -->
  <div style="padding: 18px; font-size:12px; color:var(--fg-3);" class="mono">
    <div style="margin-bottom:10px;">240w · slate-50 bg · 1px border-right</div>
    <div style="margin-bottom:10px;">item: 6/8 pad · radius-6 · 13px</div>
    <div style="margin-bottom:10px;">active: blue-50 bg · blue-700 fg · 500</div>
    <div>icon: 14px · stroke-1.7 · currentColor</div>
  </div>
</div>
</body></html>
