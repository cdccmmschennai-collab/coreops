<!doctype html><html><head><meta charset="utf-8"><title>Shadows / elevation</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background: var(--bg-app);">
  <div class="label" style="margin-bottom:14px;">Elevation — cool slate tint · very soft</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:18px; padding: 8px 4px 18px;">
    <div style="text-align:center;">
      <div style="height:64px; background:#fff; border-radius:10px; box-shadow:var(--shadow-xs);"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600;">xs</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">cards (+border)</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:#fff; border-radius:10px; box-shadow:var(--shadow-sm);"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600;">sm</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">dropdown trig</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:#fff; border-radius:10px; box-shadow:var(--shadow-md);"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600;">md</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">popovers · menus</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:#fff; border-radius:10px; box-shadow:var(--shadow-lg);"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600;">lg</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">command palette</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:#fff; border-radius:10px; box-shadow:var(--shadow-xl);"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600;">xl</div>
      <div class="mono" style="font-size:10px; color:var(--fg-3);">modals</div>
    </div>
  </div>
</div>
</body></html>
