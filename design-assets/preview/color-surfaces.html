<!doctype html><html><head><meta charset="utf-8"><title>Surface roles</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:12px;">Semantic surfaces — what you reach for in components</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">

    <div style="border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="height:48px; background:var(--bg-app);"></div>
      <div style="padding:8px 10px; border-top:1px solid var(--border-subtle);">
        <div style="font-size:12px; font-weight:600;">bg-app</div>
        <div class="mono" style="font-size:10px; color:var(--fg-3);">page canvas</div>
      </div>
    </div>

    <div style="border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="height:48px; background:var(--bg-surface);"></div>
      <div style="padding:8px 10px; border-top:1px solid var(--border-subtle);">
        <div style="font-size:12px; font-weight:600;">bg-surface</div>
        <div class="mono" style="font-size:10px; color:var(--fg-3);">cards, modals</div>
      </div>
    </div>

    <div style="border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="height:48px; background:var(--bg-surface-muted);"></div>
      <div style="padding:8px 10px; border-top:1px solid var(--border-subtle);">
        <div style="font-size:12px; font-weight:600;">bg-surface-muted</div>
        <div class="mono" style="font-size:10px; color:var(--fg-3);">card &amp; table headers</div>
      </div>
    </div>

    <div style="border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="height:48px; background:var(--bg-subtle);"></div>
      <div style="padding:8px 10px; border-top:1px solid var(--border-subtle);">
        <div style="font-size:12px; font-weight:600;">bg-subtle</div>
        <div class="mono" style="font-size:10px; color:var(--fg-3);">hover</div>
      </div>
    </div>

    <div style="border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="height:48px; background:var(--bg-muted);"></div>
      <div style="padding:8px 10px; border-top:1px solid var(--border-subtle);">
        <div style="font-size:12px; font-weight:600;">bg-muted</div>
        <div class="mono" style="font-size:10px; color:var(--fg-3);">press · selected</div>
      </div>
    </div>

    <div style="border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="height:48px; background:var(--bg-inverse);"></div>
      <div style="padding:8px 10px; border-top:1px solid var(--border-subtle);">
        <div style="font-size:12px; font-weight:600;">bg-inverse</div>
        <div class="mono" style="font-size:10px; color:var(--fg-3);">tooltips</div>
      </div>
    </div>

  </div>
</div>
</body></html>
