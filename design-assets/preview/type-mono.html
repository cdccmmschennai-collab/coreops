<!doctype html><html><head><meta charset="utf-8"><title>Type — numeric (Inter tnum)</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div>
      <div class="label" style="margin-bottom:6px;">Tabular Inter numbers · used in tables &amp; KPIs</div>
      <table class="t-num" style="font-size:14px; border-collapse:collapse;">
        <tr><td style="padding:2px 16px 2px 0; color:var(--fg-2);">Mon</td><td style="padding:2px 0; text-align:right;">7h 45m</td></tr>
        <tr><td style="padding:2px 16px 2px 0; color:var(--fg-2);">Tue</td><td style="padding:2px 0; text-align:right;">8h 10m</td></tr>
        <tr><td style="padding:2px 16px 2px 0; color:var(--fg-2);">Wed</td><td style="padding:2px 0; text-align:right;">6h 05m</td></tr>
      </table>
    </div>
    <div>
      <div class="label" style="margin-bottom:6px;">JetBrains Mono — for IDs &amp; code</div>
      <div class="mono" style="font-size:13px; color:var(--fg-1); display:flex; gap:24px;">
        <span>WT-2841</span>
        <span>v1.3.2</span>
        <span>commit a3f9c1</span>
      </div>
    </div>
    <div class="t-meta">Inter has high-quality tabular figures via <code>font-variant-numeric: tabular-nums</code> — reach for that before a mono font in tables.</div>
  </div>
</div>
</body></html>
