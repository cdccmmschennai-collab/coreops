# Workforce Management System — local development stack.
# Compose project name `wms` isolates network/volumes from the SPIR deployment.
# Host ports: frontend 3100, backend 8100, postgres 5433, redis 6381.
# Prereqs:  cp .env.example .env ; cp backend/.env.example backend/.env ; cp frontend/.env.local.example frontend/.env.local
name: wms

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wms}
      POSTGRES_DB: ${POSTGRES_DB:-wms}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    networks: [wms_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms} -d ${POSTGRES_DB:-wms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - wms_redisdata:/data
    networks: [wms_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    # In-container the app reaches db/redis by service name; these override the
    # host-oriented values in backend/.env.
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wms}:${POSTGRES_PASSWORD:-wms}@db:5432/${POSTGRES_DB:-wms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3100}
      # Business timezone — the benchmark "week" (Mon..Fri) is computed from
      # date.today(); without this the container runs in UTC and the week
      # rolls over 5.5h late (IST midnight Monday). Keeps backend in step with
      # the browser-local week shown by the frontend.
      TZ: ${TZ:-Asia/Kolkata}
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [wms_net]
    volumes:
      - ./backend:/app
    # Backend applies migrations on start (audit F4); worker does not.
    entrypoint: ["sh", "/app/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wms}:${POSTGRES_PASSWORD:-wms}@db:5432/${POSTGRES_DB:-wms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      TZ: ${TZ:-Asia/Kolkata}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [wms_net]
    volumes:
      - ./backend:/app
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info"]

  beat:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wms}:${POSTGRES_PASSWORD:-wms}@db:5432/${POSTGRES_DB:-wms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      TZ: ${TZ:-Asia/Kolkata}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [wms_net]
    volumes:
      - ./backend:/app
    # Single beat instance enqueues the daily-report reminder; the worker runs it.
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=info"]

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    # Single-office (Chennai) deployment: pin the container clock to IST so any
    # server-side date logic and logs match the backend (also Asia/Kolkata).
    environment:
      TZ: ${TZ:-Asia/Kolkata}
    ports:
      - "${FRONTEND_PORT:-3100}:3100"
    depends_on:
      - backend
    networks: [wms_net]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Isolate the container's dev build output so a host `npm run build`
      # (which writes ./frontend/.next) can't corrupt the running dev server.
      - /app/.next
    command: ["npm", "run", "dev"]

volumes:
  wms_pgdata:
  wms_redisdata:

networks:
  wms_net:
    driver: bridge
