# Workforce Management System — local development stack.
# Compose project name `wms` isolates network/volumes from the SPIR deployment.
# Host ports: frontend 3100, backend 8100, postgres 5433, redis 6381.
# Prereqs:  cp .env.example .env ; cp backend/.env.example backend/.env ; cp frontend/.env.local.example frontend/.env.local
name: wms

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wms}
      POSTGRES_DB: ${POSTGRES_DB:-wms}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    networks: [wms_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms} -d ${POSTGRES_DB:-wms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - wms_redisdata:/data
    networks: [wms_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    # In-container the app reaches db/redis by service name; these override the
    # host-oriented values in backend/.env.
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wms}:${POSTGRES_PASSWORD:-wms}@db:5432/${POSTGRES_DB:-wms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3100}
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [wms_net]
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wms}:${POSTGRES_PASSWORD:-wms}@db:5432/${POSTGRES_DB:-wms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [wms_net]
    volumes:
      - ./backend:/app
    # Present per the approved stack; no tasks defined in V0.
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info"]

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.local
    ports:
      - "${FRONTEND_PORT:-3100}:3100"
    depends_on:
      - backend
    networks: [wms_net]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]

volumes:
  wms_pgdata:
  wms_redisdata:

networks:
  wms_net:
    driver: bridge
